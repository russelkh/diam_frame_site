<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameLux</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
  <a href="index.html" class="logo">
    <img src="daim logo.PNG">
  </a>

  <nav>
    <a href="cart.html" class="cart-link">
      🛒 Cart <span class="cart-count">0</span>
    </a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Frame Your Moments. Forever.</h1>
    <p>Premium handcrafted frames designed for memories that matter.</p>
    <button class="hero-btn" onclick="scrollToProducts()">
      Explore Collection <span class="arrow">→</span>
    </button>
  </div>
</section>

<section class="products" id="products">
  <div class="scroll-row" id="product-list"></div>
</section>

<p id="no-products" style="text-align:center; display:none;">
  No products available right now 😔
</p>

<section class="how">
  <h2 class="section-title">How It Works</h2>

  <div class="how-grid">
    <div class="how-card">
      <h3>Choose</h3>
      <p>Pick your perfect frame</p>
    </div>
    <div class="how-card">
      <h3>Customize</h3>
      <p>Select size & style</p>
    </div>

    <div class="how-card">
      <h3>Delivered</h3>
      <p>Fast & safe delivery</p>
    </div>
  </div>
</section>

<footer class="footer">
  <p>Contact: +91 9876543210</p>
</footer>

<script src="script.js"></script>
</body>
</html>
