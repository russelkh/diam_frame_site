<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="navbar">
    <a href="index.html" class="logo">
      <img src="daim logo.PNG" alt="logo">
    </a>
  
    <nav>
      <a href="cart.html" class="cart-link">
        🛒 Cart
        <span class="cart-count">2</span>
      </a>
    </nav>
  </header>

<section class="product-page">

  <!-- IMAGE GALLERY -->
  <div class="gallery">

    <div class="main-image">
      <img src="https://picsum.photos/500?1" id="main-img">
    </div>

    <div class="thumbnails">
      <img src="https://picsum.photos/100?1" onclick="changeImage(this)">
      <img src="https://picsum.photos/100?2" onclick="changeImage(this)">
      <img src="https://picsum.photos/100?3" onclick="changeImage(this)">
    </div>

  </div>

  <!-- DETAILS -->
  <div class="details">
    <h1>Black Walnut A4 Frame</h1>

    <div class="tags">
      <span>Wood</span>
      <span>Premium</span>
    </div>

    <label>Size</label>
    <select id="size">
      <option>A4</option>
      <option>A3</option>
    </select>

    <label>Quantity</label>
    <input type="number" id="qty" value="1" min="1">

    <h2>₹999</h2>
    <p>In Stock</p>

    <button onclick="addToCart()" class="btn">Add to Cart</button>
    <button onclick="buyNow()" class="btn-outline">Buy Now</button>
  </div>

</section>

<footer class="footer">
  <p>Contact: +91 9876543210</p>
</footer>

<script src="script.js"></script>
</body>
</html>
